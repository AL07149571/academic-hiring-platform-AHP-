<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHP Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#e9efe3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    transition:0.6s ease;
}

body.fade-out{
    opacity:0;
    transform:scale(1.02);
}

/* TOP BAR */
.top-bar{
    position:absolute;
    top:20px;
    right:20px;
}

.profile-icon{
    font-size:26px;
    cursor:pointer;
    background:white;
    padding:10px 14px;
    border-radius:50%;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.profile-icon:hover{
    transform:scale(1.1);
}

/* DROPDOWN */
.dropdown{
    position:absolute;
    top:55px;
    right:0;
    display:flex;
    flex-direction:column;
    background:#cfcfcf;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);

    opacity:0;
    transform:translateY(-10px);
    pointer-events:none;
    transition:0.3s ease;
}

.dropdown.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
}

.dropdown button{
    margin:6px 0;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#7c8c6c;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

.dropdown button:hover{
    transform:scale(1.05);
}

.dropdown button:last-child{
    background:#b84a4a;
}

/* APP CONTAINER */
.app{
    width:350px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    padding:20px;
    text-align:center;
}

/* CARD */
.card{
    width:100%;
    height:350px;
    background:#f2f2f2;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    transition:0.4s ease;
    cursor:grab;
}

.card h2{
    margin:10px 0 5px 0;
}

.card p{
    margin:5px 0;
    color:gray;
}

/* BOTONES */
.buttons{
    margin-top:20px;
    display:flex;
    justify-content:space-around;
}

.buttons button{
    width:100px;
    height:50px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.reject{
    background:#ff3b3b;
    color:white;
}

.approve{
    background:#2ecc71;
    color:white;
}

.buttons button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- icono superior derecha (MENU) -->
<div class="top-bar">
    <div class="profile-icon" onclick="toggleMenu()">👤</div>

    <div class="dropdown" id="dropdownMenu">
        <button>My profile</button>
        <button>My likes</button>
        <button onclick="logout()">Sign out</button>
    </div>
</div>

<div class="app">
    <div class="card" id="card">
        <h2 id="name">Cargando...</h2>
        <p id="area"></p>
        <p id="experience"></p>
    </div>

    <div class="buttons">
        <button class="reject" onclick="reject()">✖</button>
        <button class="approve" onclick="approve()">✔</button>
    </div>
</div>

<script>

/*PROTECCIÓN DE SESIÓN */
if (localStorage.getItem("emailVerified") !== "true") {
    window.location.href = "login.html";
}

/* TOGGLE MENU */
function toggleMenu(){
    const menu = document.getElementById("dropdownMenu");
    menu.classList.toggle("show");
}

/* Cerrar menú si se hace click afuera */
document.addEventListener("click", function(event){
    const menu = document.getElementById("dropdownMenu");
    const icon = document.querySelector(".profile-icon");

    if(!icon.contains(event.target) && !menu.contains(event.target)){
        menu.classList.remove("show");
    }
});

/*  LOGOUT */
function logout(){
    localStorage.removeItem("emailVerified");
    document.body.classList.add("fade-out");

    setTimeout(()=>{
        window.location.href = "login.html";
    },600);
}

/* PROFILES (aqui abría que conectar con la base de datos donde te arroge los datos del cv subido de parte del profe) */ 
const profiles = [
    {name:"Carlos Mendoza", area:"Ingeniería de Sistemas", exp:"5 años experiencia"},
    {name:"Ana Torres", area:"Psicología Organizacional", exp:"3 años experiencia"},
    {name:"Luis Martínez", area:"Docente Matemáticas", exp:"7 años experiencia"},
    {name:"Sofía Herrera", area:"Recursos Humanos", exp:"4 años experiencia"}
];

let current = 0;
const card = document.getElementById("card");

function loadProfile(){
    if(current >= profiles.length){
        document.getElementById("name").innerText = "No hay más perfiles";
        document.getElementById("area").innerText = "";
        document.getElementById("experience").innerText = "";
        return;
    }

    document.getElementById("name").innerText = profiles[current].name;
    document.getElementById("area").innerText = profiles[current].area;
    document.getElementById("experience").innerText = profiles[current].exp;

    card.style.transform = "translateX(0)";
    card.style.opacity = "1";
}

function approve(){
    saveLike(profiles[current]);
    slideCard(400);
}

function reject(){
    slideCard(-400);
}

function slideCard(distance){
    card.style.transform = `translateX(${distance}px) rotate(${distance/20}deg)`;
    card.style.opacity = "0";

    setTimeout(()=>{
        current++;
        loadProfile();
    },300);
}

function saveLike(profile){
    let likes = JSON.parse(localStorage.getItem("likes")) || [];
    likes.push(profile);
    localStorage.setItem("likes", JSON.stringify(likes));
}

/* DRAG CON MOUSE (ARRASTRA CON EL MOUSE) */
let startX = 0;
let isDragging = false;

card.addEventListener("mousedown", e=>{
    isDragging = true;
    startX = e.clientX;
});

document.addEventListener("mouseup", e=>{
    if(!isDragging) return;
    isDragging = false;

    let diff = e.clientX - startX;

    if(diff > 100){
        approve();
    }else if(diff < -100){
        reject();
    }else{
        card.style.transform = "translateX(0)";
    }
});

card.addEventListener("mousemove", e=>{
    if(!isDragging) return;
    let diff = e.clientX - startX;
    card.style.transform = `translateX(${diff}px) rotate(${diff/20}deg)`;
});

loadProfile();

</script>

</body>
</html>
