<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHP Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">

    <div class="logo">
        <img src="logo.png" alt="AHP Logo">
    </div>

    <div class="profile">
        <div class="profile-icon" onclick="toggleMenu()">👤</div>

        <div class="side-panel" id="menu">
            <button onclick="openPendientes()">Pendientes</button>
            <button onclick="logout()">Sign out</button>
        </div>
    </div>

</header>

<main class="main">

    <div class="filter-box">
        <input type="text" id="searchInput" placeholder="Buscar vacante..." class="dropdown" oninput="loadVacantes()">
        <button class="add-btn" onclick="createVacante()">+</button>
    </div>

    <div class="vacantes-container" id="vacantes"></div>

</main>

<!-- ================= MODAL CV ================= -->

<div class="modal" id="cvModal">
    <div class="modal-content">

        <span class="close-btn" onclick="closeModal()">✖</span>

        <div class="cv-layout">
            <div class="cv-photo"></div>

            <div class="cv-info">
                <h2 id="cvName">Nombre</h2>

                <div class="row">
                    <span id="cvSexo">Sexo</span>
                    <span id="cvEdad">Edad</span>
                </div>

                <p id="cvCorreo">correo@email.com</p>
                <p id="cvTelefono">Teléfono: --</p>
                <p id="cvArea">Área: --</p>
                <p id="cvExperiencia">Experiencia: --</p>

                <div id="actionButtons">
                    <button class="status-btn" onclick="updateStatus('ACEPTADO')">Aceptar</button>
                    <button class="status-btn" onclick="updateStatus('RECHAZADO')">Rechazar</button>
                </div>

                <div id="interviewSection">
                    <input type="datetime-local" id="interviewInput">
                    <button class="interview-btn" onclick="saveInterview()">
                        📅 Guardar entrevista
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ================= MODAL PENDIENTES ================= -->

<div class="modal" id="pendientesModal">
    <div class="modal-content">

        <span class="close-btn" onclick="closePendientes()">✖</span>

        <h2 style="color:white;">Pendientes</h2>

        <div id="pendientesList"></div>

    </div>
</div>

<!-- load external script -->
<script src="dashboard.js"></script>


</body>
</html>
