<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta charset="UTF-8">
  <title>AHP - Create Account</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">

    <div class="left-panel">

      <img src="logo.png" class="logo">

      <h2>Create account</h2>

      <p class="back-link" onclick="location.href='login.html'">
        ← Back to Sign in
      </p>

      <form class="login-form">

  <div class="input-group">
    <i data-lucide="user" class="input-icon"></i>
    <input id="name" type="text" placeholder="Name(s)">
  </div>

  <div class="row">
    <div class="input-group small">
      <input id="phone_code" type="text" placeholder="+52">
    </div>

    <div class="input-group">
      <i data-lucide="phone" class="input-icon"></i>
      <input id="phone" type="text" placeholder="Phone">
    </div>
  </div>

  <div class="input-group">
    <i data-lucide="mail" class="input-icon"></i>
    <input id="email" type="email" placeholder="e-mail">
  </div>

  <div class="input-group">
    <i data-lucide="lock" class="input-icon"></i>
    <input id="password" type="password" placeholder="password">
  </div>

  <div class="input-group">
    <i data-lucide="lock" class="input-icon"></i>
    <input id="confirmPassword" type="password" placeholder="Confirm password">
  </div>

  <div class="input-group">
    <i data-lucide="building-2" class="input-icon"></i>
    <input id="campus" type="text" placeholder="Campus">
  </div>

<button type="button" class="submit-btn" onclick="register()">
  Create Account
</button>

</form>
    </div>

    <div class="right-panel">
      <div class="maps-card">MAPS</div>
      <div class="tag">El nuevo</div>
      <div class="tag">modelo educativo</div>
      <div class="tag arrow">para ti →</div>
    </div>

  </div>
  <script>
async function register() {
  const nombre = document.getElementById('name').value;
  const telefono = document.getElementById('phone').value;
  const correo = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const campus = document.getElementById('campus').value;
  if (!nombre || !correo || !password) {
    alert('Name, email and password are required');
    return;
  }
  if (password !== confirm) {
    alert('Passwords do not match');
    return;
  }
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, correo, telefono, campus, password })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = 'dashboard.html';
    } else {
      alert(data.error || 'Registration failed');
    }
  } catch (err) {
    console.error(err);
    alert('Network error');
  }
}
</script>
<script> lucide.createIcons()</script>
<script>

function toggleMenu(){
    document.getElementById("menu").classList.toggle("show");
}

/* Cerrar si haces click afuera */
document.addEventListener("click", function(e){
    const menu = document.getElementById("menu");
    const icon = document.querySelector(".profile-icon");

    if(!icon.contains(e.target) && !menu.contains(e.target)){
        menu.classList.remove("show");
    }
});

function logout(){
    window.location.href = "login.html";
}

</script>
</body>
</html>
