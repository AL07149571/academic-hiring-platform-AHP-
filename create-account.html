<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta charset="UTF-8">
  <title>AHP - Create Account</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div>
<form>

  <div class="login-container">

    <div class="left-panel">

      <img src="logo.png" class="logo">

      <h2>Create account</h2>

      <p class="back-link" onclick="location.href='login.html'">
        ← Back to Sign in
      </p>

      <form class="login-form">

  <div class="input-group">
    <i data-lucide="user" class="input-icon"></i>
    <input type="text" placeholder="Name(s)">
  </div>

  <div class="row">
    <div class="input-group small">
      <input type="text" placeholder="+52">
    </div>

    <div class="input-group">
      <i data-lucide="phone" class="input-icon"></i>
      <input type="text" placeholder="Phone">
    </div>
  </div>

  <div class="input-group">
    <i data-lucide="mail" class="input-icon"></i>
    <input type="email" placeholder="e-mail">
  </div>

  <div class="input-group">
    <i data-lucide="lock" class="input-icon"></i>
    <input type="password" placeholder="password">
  </div>

  <div class="input-group">
    <i data-lucide="lock" class="input-icon"></i>
    <input type="password" placeholder="Confirm password">
  </div>

  <div class="input-group">
    <i data-lucide="building-2" class="input-icon"></i>
    <input type="text" placeholder="Campus">
  </div>

<button type="button" class="submit-btn" onclick="redirectToLogin()">
  Create Account
</button>

</form>
    </div>

    <div class="right-panel">
      <div class="maps-card">MAPS</div>
      <div class="tag">El nuevo</div>
      <div class="tag">modelo educativo</div>
      <div class="tag arrow">para ti →</div>
    </div>

  </div>
  <script>
function redirectToLogin() {
  localStorage.setItem("emailVerified", "true");
  window.location.href = "login.html";
}
</script>
<script> lucide.createIcons()</script>
<script>

function toggleMenu(){
    document.getElementById("menu").classList.toggle("show");
}

/* Cerrar si haces click afuera */
document.addEventListener("click", function(e){
    const menu = document.getElementById("menu");
    const icon = document.querySelector(".profile-icon");

    if(!icon.contains(e.target) && !menu.contains(e.target)){
        menu.classList.remove("show");
    }
});

function logout(){
    window.location.href = "login.html";
}

</script>
</body>
</html>
